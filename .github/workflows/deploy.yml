name: Deploy
on:
  push:
    branches:
      - 'develop'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  STACK_NAME: makeuoft

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      GITHUB_SHA_SHORT: ${{ steps.sha7.outputs.GITHUB_SHA_SHORT }}

    steps:
      - uses: actions/checkout@v4
      - name: Get short SHA
        id: sha7
        run: |
          GITHUB_SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          echo "GITHUB_SHA_SHORT=${GITHUB_SHA_SHORT}" >> $GITHUB_ENV
          echo "GITHUB_SHA_SHORT=${GITHUB_SHA_SHORT}" >> $GITHUB_OUTPUT
      - name: Build image
        run: docker compose -f deployment/docker-compose.ci.yml build
      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        run: docker compose -f deployment/docker-compose.ci.yml push

  deploy:
    runs-on: ubuntu-latest
    needs: [ build ]
    environment:
      name: production
      url: https://makeuoft.ca
    defaults:
      run:
        working-directory: deployment
    env:
      GITHUB_SHA_SHORT: ${{ needs.build.outputs.GITHUB_SHA_SHORT }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install python dependencies
        working-directory: hackathon_site
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Use Node.js 16.x
        uses: actions/setup-node@v4
        with:
          node-version: '16.x'
      - name: Install nodejs dependencies
        working-directory: hackathon_site/event
        run: yarn install
      - name: Compile scss
        working-directory: hackathon_site/event
        run: yarn scss
      - name: Collect static
        working-directory: hackathon_site
        env:
          SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
        run: python manage.py collectstatic
      - name: Build frontend
        working-directory: hackathon_site/dashboard/frontend
        run: |
          yarn install
          yarn run build
      - name: Set environment variables in .env
        run: |
          echo 'DEBUG=0' >> .env
          echo 'SECRET_KEY=${{ secrets.CI_SECRET_KEY }}' >> .env
          echo 'DB_NAME=${{ secrets.DB_NAME }}' >> .env
          echo 'DB_USER=${{ secrets.DB_USER }}' >> .env
          echo 'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' >> .env
          echo 'DB_HOST=${{ secrets.DB_HOST }}' >> .env
          echo 'DB_PORT=${{ secrets.DB_PORT }}' >> .env
          echo 'EMAIL_HOST=${{ secrets.EMAIL_HOST }}' >> .env
          echo 'EMAIL_PORT=${{ secrets.EMAIL_PORT }}' >> .env
          echo 'EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}' >> .env
          echo 'EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}' >> .env
          echo 'EMAIL_FROM_ADDRESS=${{ secrets.EMAIL_FROM_ADDRESS }}' >> .env
          echo 'REDIS_URI=${{ secrets.REDIS_URI }}' >> .env
          echo 'RECAPTCHA_PUBLIC_KEY=${{ secrets.RECAPTCHA_PUBLIC_KEY }}' >> .env
          echo 'RECAPTCHA_PRIVATE_KEY=${{ secrets.RECAPTCHA_PRIVATE_KEY }}' >> .env
      - name: Decode SSH deploy key
        env:
          # Pass the secret through the environment (not inline ${{ }}) to avoid any
          # quoting/script-injection issues; GitHub masks it automatically.
          RAW_SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # appleboy/scp-action runs inside a container as a non-root user and cannot
          # read a key file written into the workspace by the runner (mode 600 gives
          # "permission denied"). We instead hand the key contents to the action's
          # `key:` input via an env var, which avoids the container filesystem entirely.
          #
          # The SSH_PRIVATE_KEY secret may be stored either as a raw PEM key or as
          # base64. Detect which, normalise to PEM, and fail loudly if the result is
          # not a valid private key, so we never pass garbage to the action (which
          # otherwise surfaces as the cryptic "ssh: no key found").
          if printf '%s' "$RAW_SSH_KEY" | head -n1 | grep -qa -- '-----BEGIN'; then
            DEPLOY_KEY="$RAW_SSH_KEY"
          else
            DEPLOY_KEY="$(printf '%s' "$RAW_SSH_KEY" | base64 -d 2>/dev/null || true)"
          fi
          if ! printf '%s' "$DEPLOY_KEY" | head -n1 | grep -qa -- '-----BEGIN'; then
            echo "::error::SSH_PRIVATE_KEY is not a valid PEM private key (neither as-is nor base64-decoded). Re-create the secret from an unencrypted OpenSSH private key — see the deploy notes."
            exit 1
          fi
          # Mask every line of the key so it can never surface in logs.
          printf '%s\n' "$DEPLOY_KEY" | while IFS= read -r line; do
            [ -z "$line" ] || echo "::add-mask::$line"
          done || true
          {
            echo "SSH_DEPLOY_KEY<<__SSH_KEY_EOF__"
            printf '%s\n' "$DEPLOY_KEY"
            echo "__SSH_KEY_EOF__"
          } >> "$GITHUB_ENV"
      - name: Transfer static files to the Swarm manager
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SWARM_MANAGER_IP }}
          username: ${{ secrets.SSH_USER }}
          # Pass the key contents directly (delivered via INPUT_KEY) to avoid the
          # container "permission denied" that key_path hits when reading the workspace.
          key: ${{ env.SSH_DEPLOY_KEY }}
          overwrite: true
          # scp-action doesn't obey working-directory, runs at repo root
          source: "hackathon_site/static/"
          target: "/usr/src/${{ env.IMAGE_NAME }}"
          strip_components: 1
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 ${{ secrets.SWARM_MANAGER_IP }} >> ~/.ssh/known_hosts
          # Reuse the key normalised/validated in the "Decode SSH deploy key" step
          # so the docker-over-SSH connection below uses the exact same material.
          printf '%s\n' "$SSH_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
      - name: Transfer frontend files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SWARM_MANAGER_IP }}
          username: ${{ secrets.SSH_USER }}
          # Pass the key contents directly (delivered via INPUT_KEY) to avoid the
          # container "permission denied" that key_path hits when reading the workspace.
          key: ${{ env.SSH_DEPLOY_KEY }}
          overwrite: true
          # scp-action doesn't obey working-directory, runs at repo root
          source: "hackathon_site/dashboard/frontend/build/"
          target: "/usr/src/${{ env.IMAGE_NAME }}"
          strip_components: 3
      - name: Bring up deployment
        env:
          DOCKER_HOST: ssh://${{ secrets.SSH_USER }}@${{ secrets.SWARM_MANAGER_IP }}
        run: |
          echo "Logging in to GitHub packages..."
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          echo "Bringing up deployment..."
          docker stack deploy --prune --with-registry-auth -c docker-compose.prod.yml ${{ env.STACK_NAME }}
          echo "Waiting for deployment..."
          sleep 30
          chmod 777 docker-stack-wait.sh
          ./docker-stack-wait.sh -t 600 ${{ env.STACK_NAME }}
          echo "Running migrations..."
          # TODO: It would be better to use docker-compose against the django service,
          # but there is currently a bug in docker-compose preventing running services
          # over an SSH host.
          IMAGE=${REGISTRY}/${IMAGE_NAME}/django:${GITHUB_SHA_SHORT}
          docker run --rm --env-file .env ${IMAGE} python manage.py migrate
          echo "Deployment complete"
